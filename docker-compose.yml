version: '3.8'

services:
  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"

  weprotocol:
    build: .
    depends_on:
      - redis
    ports:
      - "8005:8058"
    volumes:
      - ./conf:/usr/wic-go/conf          # your host config (including the redislink change)
      - weprotocol-data:/usr/wic-go      # persists app data + binary (as you requested)

volumes:
  redis-data:
  weprotocol-data: